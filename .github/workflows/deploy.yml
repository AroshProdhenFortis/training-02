name: React CI-CD (Windows VPS)

on:
  push:
    branches: ["main"]

jobs:
  build_and_deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to IIS folder
        shell: powershell
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "dist"
          $dst = "G:\training-a\frontend-2"

          if (!(Test-Path $dst)) { New-Item -ItemType Directory -Path $dst | Out-Null }

          # Clean old files
          Get-ChildItem -Path $dst -Force | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

          # Copy new build
          robocopy $src $dst /E /NFL /NDL /NJH /NJS /NP
          $rc = $LASTEXITCODE

          if ($rc -ge 8) {
            Write-Host "Robocopy failed with code $rc"
            exit $rc
          }

          Write-Host "Robocopy success with code $rc"
          exit 0
